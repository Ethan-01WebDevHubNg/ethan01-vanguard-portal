<main class="w-full max-w-md px-6 z-10 h-screen flex flex-col justify-center mx-auto overflow-hidden">
<div class="mb-8 text-center">
<img src="/assets/icons/ethan01logo.svg" alt="ETHAN01 Logo" class="h-8 w-auto mx-auto mb-3 object-contain">
<p class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Security Gateway</p>
</div>
<div class="bg-surface-container-low p-1 rounded-xl shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
<div class="bg-surface-container-high rounded-[calc(0.5rem-1px)] p-6 md:p-8">
<header class="mb-6">
<h2 class="text-2xl font-black tracking-tight text-on-surface mb-2">Reset Password</h2>
<p class="text-on-surface-variant text-[0.875rem] leading-relaxed">Ensure your new password is at least 12 characters with mixed symbols.</p>
</header>
<form class="space-y-4" onsubmit="event.preventDefault(); const btn = document.getElementById('update-btn'); btn.innerHTML = '<span class=\'material-symbols-outlined animate-spin\'>sync</span> Processing...'; setTimeout(() => { Toast.show('Credentials updated successfully.', 'success'); window.location.hash='#/admin/login'; }, 1500);">
<div class="space-y-2">
<div class="flex justify-between items-end ml-1">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant">New Password</label>
<span id="strength-text" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Strength: Pending</span>
</div>
<div class="relative group">
<input class="w-full bg-surface-container border border-outline-variant rounded-lg py-3 px-4 text-on-surface placeholder:text-zinc-600 focus:bg-surface-container-lowest focus:text-on-surface focus:ring-2 focus:ring-primary transition-all duration-300 outline-none" placeholder="••••••••••••" required="" type="password" id="new-password" oninput="if(window.checkPasswordStrength) window.checkPasswordStrength(this.value)"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-2">
    <button type="button" class="text-zinc-500 hover:text-on-surface transition-colors cursor-pointer flex items-center justify-center p-2"
        onmousedown="document.getElementById('new-password').type='text'" 
        onmouseup="document.getElementById('new-password').type='password'" 
        onmouseleave="document.getElementById('new-password').type='password'"
        ontouchstart="document.getElementById('new-password').type='text'"
        ontouchend="document.getElementById('new-password').type='password'"
        ondblclick="if(window.Toast) window.Toast.show('Press and hold to view password.', 'info')"
        title="Press and hold to view">
        <span class="material-symbols-outlined text-lg">visibility</span>
    </button>
</div>
</div>
<div id="strength-bars" class="flex gap-1 h-1 w-full mt-2">
<div class="strength-bar flex-1 bg-outline-variant rounded-full transition-colors duration-300"></div>
<div class="strength-bar flex-1 bg-outline-variant rounded-full transition-colors duration-300"></div>
<div class="strength-bar flex-1 bg-outline-variant rounded-full transition-colors duration-300"></div>
<div class="strength-bar flex-1 bg-outline-variant rounded-full transition-colors duration-300"></div>
</div>
</div>
<div class="space-y-2">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant ml-1">Confirm New Password</label>
<div class="relative group">
<input class="w-full bg-surface-container border border-outline-variant rounded-lg py-3 px-4 text-on-surface placeholder:text-zinc-600 focus:bg-surface-container-lowest focus:text-on-surface focus:ring-2 focus:ring-primary transition-all duration-300 outline-none" placeholder="••••••••••••" required="" type="password" id="confirm-password" oninput="if(window.checkPasswordMatch) window.checkPasswordMatch(this.value)"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-2">
    <button type="button" class="text-zinc-500 hover:text-on-surface transition-colors cursor-pointer flex items-center justify-center p-2"
        onmousedown="document.getElementById('confirm-password').type='text'" 
        onmouseup="document.getElementById('confirm-password').type='password'" 
        onmouseleave="document.getElementById('confirm-password').type='password'"
        ontouchstart="document.getElementById('confirm-password').type='text'"
        ontouchend="document.getElementById('confirm-password').type='password'"
        ondblclick="if(window.Toast) window.Toast.show('Press and hold to view password.', 'info')"
        title="Press and hold to view">
        <span class="material-symbols-outlined text-lg">visibility</span>
    </button>
</div>
</div>
</div>
<div class="pt-4">
<button id="update-btn" class="w-full bg-primary text-surface-container-lowest font-black uppercase tracking-widest py-3 rounded-lg shadow-[0_4px_20px_rgba(204,255,0,0.15)] hover:bg-primary-container active:scale-[0.98] transition-all flex justify-center items-center gap-3" type="submit">
    <span>Update Credentials</span>
    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-6 text-center">
<p class="text-on-surface-variant text-xs font-medium">
                        Issue with access? 
                        <a class="text-on-surface font-bold hover:text-primary underline underline-offset-4 ml-1 transition-colors" href="#" onclick="Toast.show('Connecting to Security Team...', 'info')">Contact Security Team</a>
</p>
</div>
</div>
</div>
<div class="mt-8 flex items-center justify-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface">AES-256 Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">gpp_good</span>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface">ISO 27001</span>
</div>
</div>
</main>
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
</div>
