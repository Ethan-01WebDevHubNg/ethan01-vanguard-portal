<main class="w-full max-w-md z-10 min-h-screen flex flex-col justify-center mx-auto py-8 px-6 overflow-y-auto lg:overflow-hidden">
<div class="mb-8 text-center">
<img src="/assets/icons/ethan01logo.svg" alt="ETHAN01 Logo" class="h-8 w-auto mx-auto mb-4 object-contain">
<div class="h-[1px] w-12 bg-primary/30 mx-auto"></div>
</div>
<div class="bg-surface-container-low rounded-xl p-6 md:p-8 relative overflow-hidden group">
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl group-hover:bg-primary/10 transition-colors duration-500"></div>
<div class="relative z-10">
<header class="mb-6">
<h1 class="text-3xl font-black tracking-tight text-on-surface mb-3">Reset Access</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        Enter your registered staff email address below. We'll send a secure recovery link to your inbox.
                    </p>
</header>
<form class="space-y-4" onsubmit="event.preventDefault(); const btn = document.getElementById('recovery-btn'); btn.innerHTML = '<span class=\'material-symbols-outlined animate-spin\'>sync</span> Processing...'; setTimeout(() => { Toast.show('Recovery link sent to your email.', 'success'); window.location.hash='#/admin/reset-password'; }, 1500);">
<div class="space-y-2">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Staff Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-zinc-500 group-focus-within:text-on-surface transition-colors duration-300">
                                mail
                            </span>
</div>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg py-3 pl-12 pr-4 text-on-surface placeholder:text-zinc-600 focus:bg-surface-container-lowest focus:text-on-surface focus:ring-2 focus:ring-primary transition-all duration-300 outline-none" id="email" placeholder="admin@ethan01.com" required="" type="email"/>
</div>
</div>
<div class="pt-2">
<button id="recovery-btn" class="w-full bg-primary text-surface-container-lowest font-black uppercase tracking-widest py-3 rounded-lg hover:bg-primary-container transition-all duration-300 transform active:scale-[0.98] shadow-[0_4px_20px_rgba(204,255,0,0.15)] flex items-center justify-center gap-3" type="submit">
<span class="text-sm">Send Recovery Link</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-6 flex flex-col items-center gap-4">
<div class="h-px w-full bg-outline-variant"></div>
<a class="group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors duration-200" href="#/admin/login">
<span class="material-symbols-outlined text-sm" data-icon="keyboard_backspace">keyboard_backspace</span>
<span class="font-bold tracking-widest text-[0.6875rem] uppercase">Back to Login</span>
</a>
</div>
</div>
</div>
<footer class="mt-8 text-center">
<p class="text-xs text-on-surface-variant">
                Having trouble? Contact the 
                <a class="text-on-surface hover:text-primary underline decoration-primary/20 underline-offset-4 transition-all font-bold" href="mailto:tech@ethan01.com">Internal Support Desk</a>
</p>
</footer>
</main>
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
<div class="absolute top-[10%] left-[10%] w-[20%] h-[20%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
