<template id="tpl-integration-item">

                <span class="material-symbols-outlined text-[18px]">visibility</span>
            </button>
        </div>
    </div>
</template>

<img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" style="display:none;" onload="
    window.openInviteModal = function() {
        const m = document.getElementById('tpl-invite-modal').innerHTML;
        const a = document.getElementById('tpl-invite-action').innerHTML;
        if(window.Modal) window.Modal.show('Invite Agency Staff', m, a);
    };

    window.openAddIntegrationModal = function() {
        const m = document.getElementById('tpl-integration-modal').innerHTML;
        const a = document.getElementById('tpl-integration-action').innerHTML;
        if(window.Modal) window.Modal.show('Add New Integration', m, a);
    };

    window.saveIntegration = function() {
        const nameIn = document.getElementById('new-int-name');
        const keyIn = document.getElementById('new-int-key');
        const name = (nameIn && nameIn.value) ? nameIn.value : 'Custom Webhook';
        const key = (keyIn && keyIn.value) ? keyIn.value : 'sk_live_custom...';
        
        const cont = document.getElementById('integrations-container');
        if(cont) {
            let html = document.getElementById('tpl-integration-item').innerHTML;
            html = html.replace(/{name}/g, name)
                       .replace(/{statusClass}/g, 'bg-[var(--color-primary-glow)] text-primary')
                       .replace(/{statusText}/g, 'Active')
                       .replace(/{key}/g, key)
                       .replace(/{placeholder}/g, '');
            cont.insertAdjacentHTML('beforeend', html);
        }
        if(window.Modal) window.Modal.hide();
        if(window.Toast) window.Toast.show('Integration credential secured.', 'success');
    };

    window.toggleKeyVisibility = function(btn) {
        const input = btn.previousElementSibling;
        const icon = btn.querySelector('span');
        if(input.type === 'password') {
            input.type = 'text';
            icon.innerText = 'visibility_off';
        } else {
            input.type = 'password';
            icon.innerText = 'visibility';
        }
    };

    window.handleSettingsHydration = function(e) {
        const payload = e.detail;
        if(!payload) return;

        const role = payload.currentUser?.role || 'Staff';
        const isSuper = role === 'Super Admin' || role === 'Supreme Admin' || role === 'admin';
        const isDev = role === 'Developer';

        // 1. RBAC Visibility Application
        if (!isSuper) {
            const footer = document.getElementById('settings-footer');
            if(footer) footer.remove();

            document.querySelectorAll('.rbac-hide-element').forEach(el => el.remove());
            
            document.querySelectorAll('.rbac-input').forEach(input => {
                input.readOnly = true;
                input.classList.add('opacity-70', 'pointer-events-none');
            });
        }

        // 2. Integration Clearance
        if (!isSuper && !isDev) {
            const intgSec = document.getElementById('section-integrations');
            if(intgSec) intgSec.remove();
        }

        // 3. Hydrate Agency Config
        if(payload.agency) {
            const nameEl = document.getElementById('settings-agency-name');
            const hqEl = document.getElementById('settings-hq');
            const domainEl = document.getElementById('settings-domain');
            const phoneEl = document.getElementById('settings-phone');
            const avatarEl = document.getElementById('settings-avatar');

            if(nameEl && payload.agency.name) nameEl.value = payload.agency.name;
            if(hqEl && payload.agency.hq) hqEl.value = payload.agency.hq;
            if(domainEl && payload.agency.domain) domainEl.value = payload.agency.domain;
            if(phoneEl && payload.agency.phone) phoneEl.value = payload.agency.phone;
            if(avatarEl && payload.agency.logoUrl) avatarEl.src = payload.agency.logoUrl;
        }

        // 4. Hydrate Integrations (If permitted)
        const intCont = document.getElementById('integrations-container');
        const intTpl = document.getElementById('tpl-integration-item');
        if(intCont && intTpl && payload.integrations && (isSuper || isDev)) {
            intCont.innerHTML = '';
            payload.integrations.forEach(int => {
                let html = intTpl.innerHTML;
                html = html.replace(/{name}/g, int.name)
                           .replace(/{statusClass}/g, int.active ? 'bg-[var(--color-primary-glow)] text-primary' : 'bg-surface-container-highest text-on-surface-variant')
                           .replace(/{statusText}/g, int.active ? 'Active' : 'Disconnected')
                           .replace(/{key}/g, int.key || '')
                           .replace(/{placeholder}/g, int.active ? '' : 'Enter endpoint secret...');
                intCont.innerHTML += html;
            });
        }

        // 5. Hydrate Active Staff Tracker
        const staffCont = document.getElementById('staff-table-container');
        const staffTpl = document.getElementById('tpl-staff-row');
        if(staffCont && staffTpl && payload.staff) {
            staffCont.innerHTML = '';
            payload.staff.forEach(member => {
                let html = staffTpl.innerHTML;
                html = html.replace(/{name}/g, member.name)
                           .replace(/{email}/g, member.email)
                           .replace(/{avatarUrl}/g, member.avatarUrl || '/assets/icons/ethan01logo.svg')
                           .replace(/{roleClass}/g, member.role === 'Super Admin' || member.role === 'Supreme Admin' ? 'border-[var(--color-primary-alpha-30)] text-primary' : 'border-outline-variant text-on-surface-variant')
                           .replace(/{role}/g, member.role)
                           .replace(/{activity}/g, member.activity);
                staffCont.innerHTML += html;
            });
        }
    };

    window.removeEventListener('vanguard-settings-sync', window.handleSettingsHydration);
    window.addEventListener('vanguard-settings-sync', window.handleSettingsHydration);

    // --- REAL-TIME TELEMETRY ENGINE ---
    setInterval(() => {
        const apiEl = document.getElementById('metric-api');
        const storeEl = document.getElementById('metric-storage');
        const upEl = document.getElementById('metric-uptime');
        if(apiEl) {
            const base = 842;
            const variance = (Math.random() * 5 - 2).toFixed(1);
            apiEl.innerText = (base + parseFloat(variance)).toFixed(1) + 'K';
        }
        if(storeEl) {
            const current = parseFloat(storeEl.innerText) || 1.2;
            const newStorage = current + (Math.random() * 0.001);
            storeEl.innerText = newStorage.toFixed(3) + ' TB';
        }
        if(upEl) {
            upEl.innerText = '99.9' + Math.floor(Math.random() * 9) + '%';
        }
    }, 3000);

    // --- STAFF ACTIVITY HEARTBEAT ---
    setInterval(() => {
        document.querySelectorAll('.staff-activity-time').forEach(el => {
            const txt = el.innerText;
            if(txt !== 'Online' && txt !== 'Just now') {
                if(txt.includes('m ago')) {
                    let mins = parseInt(txt);
                    el.innerText = (mins + 1) + 'm ago';
                } else {
                    el.innerText = '1m ago';
                }
            }
        });
    }, 60000);

    this.remove();
" />
